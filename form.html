<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Document</title>
</head>
<body>
    <h1>Ajanvaraus</h1>
    <form>
        <fieldset>
            <legend>Varaajan tiedot:</legend>
                <label for="fname">Varaajan nimi:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Etu- ja sukunimesi..." autofocus>
        <br>
        <br>
                <label for="lname">Lemmikin nimi:</label>
                <input type="text" id="petname" name="petname" placeholder="Lemmikkisi nimi...">
        <br>
        <br>
                <label for="petage">Lemmikin ikä:</label>
                <input type="number" min="0" max="200" id="petage" name="petage" placeholder="0-200">
        <br>
        <br>
                <label for="pettype">Rotu:</label>
                <select id="pettype" name="pettype">
                    <option value="dog">Koira</option>
                    <option value="cat">Kissa</option>
                    <option value="rodent">Jyrsijä</option>
                    <option value="reptile">Matelija</option>
                    <option value="other">Muu</option>
                </select>
                <br>
                <small>(Jos "muu", kirjoita "Viesti"-osioon mikä...)</small>
        <br>
        <br>
                <label for="phone">Puhelinnumero:</label>
                <input type="tel" id="phone" name="phone" pattern="+[0-9]{3}(0)[0-9]{2}[0-9]{7}" placeholder="+358(0)401234567">
        <br>
        <br>
                <label for="email">Sähköposti:</label>
                <input type="email" id="email" name="email" placeholder="Sähköpostiosoitteesi...">
        <br>
        <br>
        </fieldset>
        <br>
        <p>Minuun saa ottaa yhteyttä:</p>
        <label class="container">Sähköpostitse</label>
        <input type="checkbox" checked="checked">
        <span class="checkmark"></span>
        <br>
        <label class="container">Puhelimitse</label>
        <input type="checkbox">
        <span class="checkmark"></span>
        <br>
        <label class="container">Ei yhteydenottoa</label>
        <input type="checkbox">
        <span class="checkmark"></span>
        <br>
        <br>
        <label for="subject">Viesti:</label>
        <br>
        <textarea id="subject" name="subject" placeholder="Kirjoita viesti tähän..." rows="10" cols="50"></textarea>
        <br>
        <button type="submit">Lähetä lomake</button>
        <br>
        <br>
    </form>
    
</body>
</html>
